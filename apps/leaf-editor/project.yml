name: LeafEditorApp
options:
  bundleIdPrefix: dev.leaf
  deploymentTarget:
    iOS: "16.0"
    macOS: "12.0"
  createIntermediateGroups: true

# One cross-platform host for the `LeafUI` editor — the same SwiftUI sources build
# for macOS (AppKit surface) and iOS (UIKit surface); `LeafUI` already carries
# both renderers, so `App/` is chrome only. Supersedes the old iOS-only demo.
#
# The editor is consumed as a local Swift package: `LeafUI` (the renderer) →
# `LeafFFI` (the generated binding, built from source) → the C module in
# `generated/headers`. The Rust staticlib is force-loaded (below) and rebuilt by
# the pre-build script every Xcode build, so Rust changes always take effect
# without re-running `bootstrap.sh` (needed only on first setup or when the Rust
# *API* changes and the binding must be regenerated).
packages:
  LeafFFI:
    path: ../../packages/leaf-swift

targets:
  LeafEditorApp:
    type: application
    # A single multiplatform target: Xcode builds it for whichever destination is
    # selected (My Mac / an iOS simulator / a device). `LeafUI` compiles the
    # matching AppKit or UIKit surface behind `#if canImport(...)`.
    supportedDestinations: [macOS, iOS]
    sources:
      - path: App
    dependencies:
      - package: LeafFFI
        product: LeafUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leaf.editor.ui
        PRODUCT_NAME: LeafEditorApp
        # Let Xcode synthesize Info.plist; per-key values (incl. iOS-only ones)
        # come from INFOPLIST_KEY_* below, SDK-conditional where they differ.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Leaf
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphoneos*]": YES
        "INFOPLIST_KEY_UILaunchScreen_Generation[sdk=iphonesimulator*]": YES
        "INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphoneos*]": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations[sdk=iphonesimulator*]": "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # macOS: an ordinary windowed app.
        "INFOPLIST_KEY_LSApplicationCategoryType[sdk=macosx*]": public.app-category.productivity
        # Language mode 5 — the Swift-6 strict-concurrency checker would reject the
        # FFI handle crossing the main-actor boundary; the model serialises access.
        SWIFT_VERSION: "5.0"
        ENABLE_BITCODE: NO
        ONLY_ACTIVE_ARCH: YES
        # Simulator/local run needs no signing — no Apple developer team required.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        # macOS won't launch a sandboxed app that isn't signed; this host is a local
        # test harness, so run it unsandboxed.
        "ENABLE_APP_SANDBOX[sdk=macosx*]": NO
        # Force-load the Rust staticlib the pre-build script produces. The path is
        # SDK-conditional (mac vs sim vs device); $(LEAF_STATIC_LIB) picks the match.
        # PROJECT_DIR is apps/leaf-editor → ../.. is the repo root whose `target/`
        # cargo writes into.
        OTHER_LDFLAGS:
          - "-force_load"
          - "$(LEAF_STATIC_LIB)"
        "LEAF_STATIC_LIB[sdk=macosx*]": "$(PROJECT_DIR)/../../target/aarch64-apple-darwin/debug/libleaf_ffi.a"
        "LEAF_STATIC_LIB[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../../target/aarch64-apple-ios-sim/debug/libleaf_ffi.a"
        "LEAF_STATIC_LIB[sdk=iphoneos*]": "$(PROJECT_DIR)/../../target/aarch64-apple-ios/debug/libleaf_ffi.a"
      configs:
        Release:
          "LEAF_STATIC_LIB[sdk=macosx*]": "$(PROJECT_DIR)/../../target/aarch64-apple-darwin/release/libleaf_ffi.a"
          "LEAF_STATIC_LIB[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../../target/aarch64-apple-ios-sim/release/libleaf_ffi.a"
          "LEAF_STATIC_LIB[sdk=iphoneos*]": "$(PROJECT_DIR)/../../target/aarch64-apple-ios/release/libleaf_ffi.a"
    preBuildScripts:
      - name: "Build leaf-ffi staticlib"
        basedOnDependencyAnalysis: false
        # Declaring the staticlib as an output tells the build system this phase
        # produces it, so it schedules before the link step and doesn't fail the
        # planning-stage "input file not found" check when the .a doesn't exist yet.
        outputFiles:
          - "$(LEAF_STATIC_LIB)"
        shell: /bin/bash
        script: |
          set -euo pipefail
          # Xcode's build env has a minimal PATH; add the user's toolchains.
          export PATH="$HOME/.nix-profile/bin:$HOME/.cargo/bin:/opt/homebrew/bin:$PATH"
          cd "${PROJECT_DIR}/../.."        # repo root (workspace Cargo.toml)

          case "${PLATFORM_NAME}" in
            macosx)           RUST_TARGET="aarch64-apple-darwin" ;;
            iphonesimulator)  RUST_TARGET="aarch64-apple-ios-sim" ;;
            *)                RUST_TARGET="aarch64-apple-ios" ;;
          esac
          [ "${CONFIGURATION}" = "Release" ] && CARGO_FLAGS="--release" || CARGO_FLAGS=""

          echo "leaf-ffi: cargo build -p leaf-ffi --target ${RUST_TARGET} ${CARGO_FLAGS}"
          rustup target add "${RUST_TARGET}" 2>/dev/null || true
          cargo build -p leaf-ffi --target "${RUST_TARGET}" ${CARGO_FLAGS}
