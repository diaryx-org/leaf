name: LeafEditor
options:
  bundleIdPrefix: dev.leaf
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

targets:
  LeafEditor:
    type: application
    platform: iOS
    sources:
      - path: main.m
        type: file
        buildPhase: sources
      - path: gpui_ios.h
        type: file
        buildPhase: headers
      - path: LaunchScreen.storyboard
        type: file
        buildPhase: resources
      - path: Assets.xcassets
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leaf.editor
        PRODUCT_NAME: LeafEditor
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SWIFT_VERSION: "5.0"
        CLANG_ENABLE_MODULES: YES
        CLANG_ENABLE_OBJC_ARC: YES
        ENABLE_BITCODE: NO
        # We statically link the Rust library; Xcode 16's debug-dylib executor
        # would try to dlopen a dylib and fail.
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LINK_BINARY_WITH_LIBRARIES_SECTION_TYPE: static
        DEAD_CODE_STRIPPING: NO
        # Simulator builds don't need code signing — disable it so no Apple
        # developer team is required to run this spike.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        # Force-load the single Rust static lib (it bundles leaf-ios + gpui-mobile
        # + gpui + everything). Explicit .a path so the linker never picks a dylib.
        OTHER_LDFLAGS:
          - "-force_load"
          - "$(LEAF_STATIC_LIB)"
          - "-lc++"
          - "-framework UIKit"
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework QuartzCore"
          - "-framework CoreGraphics"
          - "-framework CoreText"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework Security"
          - "-framework SystemConfiguration"
          - "-framework AudioToolbox"
          - "-framework WebKit"
          - "-framework CoreMedia"
          - "-framework AVFoundation"
          - "-framework LocalAuthentication"
          - "-framework Contacts"
          - "-framework EventKit"
          - "-framework StoreKit"
          - "-framework CoreMotion"
          - "-ObjC"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "USE_GPUI_RUST=1"
          - "$(inherited)"
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        VALID_ARCHS: "arm64"
        ARCHS: "arm64"
        ONLY_ACTIVE_ARCH: YES
        # Rust staticlib path (SDK-conditional). $(LEAF_STATIC_LIB) in
        # OTHER_LDFLAGS above resolves to the matching one. project.yml is at
        # apps/leaf-ios/ios, so ../target is apps/leaf-ios/target.
        "LEAF_STATIC_LIB[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios-sim/debug/libleaf_ios.a"
        "LEAF_STATIC_LIB[sdk=iphoneos*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios/debug/libleaf_ios.a"
      configs:
        Debug:
          GCC_OPTIMIZATION_LEVEL: "0"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        Release:
          "LEAF_STATIC_LIB[sdk=iphonesimulator*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios-sim/release/libleaf_ios.a"
          "LEAF_STATIC_LIB[sdk=iphoneos*]": "$(PROJECT_DIR)/../target/aarch64-apple-ios/release/libleaf_ios.a"
          GCC_OPTIMIZATION_LEVEL: "s"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    preBuildScripts:
      - name: "Build Rust Static Library"
        script: |
          set -euo pipefail
          # Xcode's build environment has a minimal PATH; add the user's toolchain.
          export PATH="$HOME/.nix-profile/bin:$HOME/.cargo/bin:/opt/homebrew/bin:$PATH"

          cd "${PROJECT_DIR}/.."   # apps/leaf-ios (has Cargo.toml + rust-toolchain.toml)

          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            RUST_TARGET="aarch64-apple-ios-sim"
          else
            RUST_TARGET="aarch64-apple-ios"
          fi
          [ "${CONFIGURATION}" = "Release" ] && CARGO_FLAGS="--release" || CARGO_FLAGS=""

          echo "leaf-ios: cargo build --target ${RUST_TARGET} ${CARGO_FLAGS}"
          rustup target add "${RUST_TARGET}" 2>/dev/null || true
          cargo build --target "${RUST_TARGET}" ${CARGO_FLAGS}
        shell: /bin/bash
        basedOnDependencyAnalysis: false
